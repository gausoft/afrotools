name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Detect which paths changed — used by security and deploy to skip when irrelevant
  changes:
    runs-on: ubuntu-latest
    outputs:
      specs: ${{ steps.filter.outputs.specs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            specs:
              - 'specs/**'

  # Validate all specs (or changed ones on PR)
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate changed specs (PR)
        if: github.event_name == 'pull_request'
        run: npm run validate:changed
      - name: Validate all specs (push to main)
        if: github.event_name == 'push'
        run: npm run validate
      - name: Trigger downstream redeploys
        if: github.event_name == 'push' && success()
        run: |
          for repo in afrotools/mcp afrotools/core; do
            echo "Dispatching specs-updated to $repo..."
            gh api repos/$repo/dispatches \
              --method POST --field event_type=specs-updated
          done
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

  # Regenerate README providers table — only on push to main, after validate passes
  generate-readme:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.DISPATCH_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate README tables
        run: node scripts/generate-readme.js
      - name: Open PR if README changed
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          branch: chore/update-providers-table
          commit-message: "chore: update providers table"
          title: "chore: update providers table"
          body: "Auto-generated by the `generate-readme` CI job."
          labels: automated
      - name: Checkout afrotools/.github
        uses: actions/checkout@v6
        with:
          repository: afrotools/.github
          path: org-profile
          token: ${{ secrets.DISPATCH_TOKEN }}
      - name: Generate org profile table
        run: README_PATH=org-profile/profile/README.md node scripts/generate-readme.js
      - name: Open PR on afrotools/.github if changed
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          path: org-profile
          branch: chore/update-providers-table
          commit-message: "chore: update providers table"
          title: "chore: update providers table"
          body: "Auto-generated by the `generate-readme` CI job in afrotools/afrotools."
          labels: automated

  # Enforce plugin version bump when plugin/skills/** changes
  check-plugin-version:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require version bump when skills change
        run: |
          SKILLS_CHANGED=$(git diff --name-only origin/main...HEAD | grep '^plugin/skills/' || true)
          VERSION_CHANGED=$(git diff --name-only origin/main...HEAD | grep '^plugin/plugin.json' || true)

          if [ -n "$SKILLS_CHANGED" ] && [ -z "$VERSION_CHANGED" ]; then
            echo "❌  plugin/skills/ was modified but plugin/plugin.json was not updated."
            echo ""
            echo "Changed skill files:"
            echo "$SKILLS_CHANGED"
            echo ""
            echo "Bump the version in plugin/plugin.json before merging."
            echo "Users with a cached install will not get the new skill until the version changes."
            exit 1
          fi

          if [ -n "$SKILLS_CHANGED" ]; then
            VERSION=$(python3 -c "import json; print(json.load(open('plugin/plugin.json'))['version'])")
            echo "✅  plugin/skills/ changed — plugin/plugin.json updated (version: $VERSION)"
          else
            echo "✅  No plugin/skills/ changes — no version bump required."
          fi

  # Security scan + CodeQL — only when specs/** changed
  security:
    needs: changes
    if: needs.changes.outputs.specs == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Security scan — changed specs (PR)
        if: github.event_name == 'pull_request'
        run: node scripts/validate.js --changed --security-only
      - name: Security scan — all specs (push to main)
        if: github.event_name == 'push'
        run: node scripts/validate.js --security-only
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
