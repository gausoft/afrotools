name: Validate specs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate changed specs (PR)
        if: github.event_name == 'pull_request'
        run: npm run validate:changed
      - name: Validate all specs (push to main)
        if: github.event_name == 'push'
        run: npm run validate
